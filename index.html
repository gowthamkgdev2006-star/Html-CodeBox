<!DOCTYPE html>
<html>
  <head>
    <title>Spy</title>
  <style>
    div
    {
    width: 150px;
    height: 50px;
    color: black;
    display: inline-block;
    padding: 10px;
    }
    .one{background-color:red;}
    .two{background-color:orange;}
    .three{background-color:yellow;}
    .four{background-color:green;}
    .five{background-color:blue;}

  </style>
  </head>
  
  <body>
    <h1>I spy with my little eye something...</h1>
      <div class="one">Clock</div>
      <div class="two">Calender</div>
      <div class="three">Glass</div>
      <div class="four">Notebook</div>
      <div class="five">Coin</div>
  </body>
</html>
